<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="navbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D8FF"/>
      <stop offset="100%" style="stop-color:#A86BFF"/>
    </linearGradient>
    <linearGradient id="textgrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D8FF"/>
      <stop offset="100%" style="stop-color:#A86BFF"/>
    </linearGradient>
  </defs>
  <!-- Dark background -->
  <rect width="200" height="200" fill="#080C14" rx="20"/>
  <!-- Gradient icon square (same as navbar: 80x80 centered) -->
  <rect x="60" y="36" width="80" height="80" fill="url(#navbg)" rx="18"/>
  <!-- "D" text in icon -->
  <text x="100" y="97" font-family="Poppins, system-ui, sans-serif" font-size="50"
        font-weight="900" fill="#080C14" text-anchor="middle">D</text>
  <!-- DaVinci AI text -->
  <text x="100" y="152" font-family="Poppins, system-ui, sans-serif" font-size="22"
        font-weight="700" fill="white" text-anchor="middle">Da<tspan fill="url(#textgrad)">Vinci</tspan></text>
  <text x="100" y="152" font-family="Poppins, system-ui, sans-serif" font-size="22"
        font-weight="700" fill="white" text-anchor="middle" dy="0">
    <tspan dx="0">Da</tspan><tspan fill="url(#textgrad)">Vinci</tspan><tspan fill="rgba(255,255,255,0.35)" font-weight="300" font-size="14" dy="-2"> AI</tspan>
  </text>
  <!-- Tagline -->
  <text x="100" y="173" font-family="system-ui, sans-serif" font-size="8"
        font-weight="600" fill="#00D8FF" text-anchor="middle" letter-spacing="2.5" opacity="0.65">AI AGENT STUDIO</text>
</svg>
