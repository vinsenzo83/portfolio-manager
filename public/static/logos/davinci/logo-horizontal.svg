<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 80" width="380" height="80">
  <defs>
    <linearGradient id="navbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D8FF"/>
      <stop offset="100%" style="stop-color:#A86BFF"/>
    </linearGradient>
    <linearGradient id="textgrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D8FF"/>
      <stop offset="100%" style="stop-color:#A86BFF"/>
    </linearGradient>
  </defs>
  <!-- Dark background -->
  <rect width="380" height="80" fill="#080C14" rx="14"/>
  <!-- Icon: gradient square 46x46 at (17,17) -->
  <rect x="17" y="17" width="46" height="46" fill="url(#navbg)" rx="10"/>
  <!-- "D" in icon -->
  <text x="40" y="52" font-family="Poppins, system-ui, sans-serif" font-size="28"
        font-weight="900" fill="#080C14" text-anchor="middle">D</text>
  <!-- DaVinci AI text -->
  <text x="82" y="46" font-family="Poppins, system-ui, sans-serif" font-size="26" font-weight="700" fill="white">Da<tspan fill="url(#textgrad)">Vinci</tspan><tspan fill="rgba(255,255,255,0.35)" font-weight="300" font-size="16" dy="-2"> AI</tspan></text>
  <!-- Tagline -->
  <text x="82" y="62" font-family="system-ui, sans-serif" font-size="9"
        font-weight="600" fill="#00D8FF" letter-spacing="2" opacity="0.65">AI AGENT STUDIO · BNB CHAIN</text>
</svg>
