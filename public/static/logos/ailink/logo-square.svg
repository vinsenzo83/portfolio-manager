<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="navbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#003BFF"/>
      <stop offset="100%" style="stop-color:#31F2C3"/>
    </linearGradient>
    <linearGradient id="textgrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#003BFF"/>
      <stop offset="100%" style="stop-color:#31F2C3"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Dark background -->
  <rect width="200" height="200" fill="#080d1a" rx="20"/>
  <!-- Icon area: 80x80 centered at (100, 82) -->
  <!-- Gradient square icon background -->
  <rect x="60" y="42" width="80" height="80" fill="url(#navbg)" rx="18"/>
  <!-- Node icon scaled to 80x80 (scale=4, center=100,82) -->
  <circle cx="100" cy="82" r="8" fill="white" filter="url(#glow)"/>
  <!-- N/S/E/W lines -->
  <line x1="100" y1="48"  x2="100" y2="68"  stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="100" y1="96"  x2="100" y2="116" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="66"  y1="82"  x2="86"  y2="82"  stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="114" y1="82"  x2="134" y2="82"  stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Diagonal lines -->
  <line x1="72"  y1="56"  x2="84"  y2="68"  stroke="white" stroke-width="3"   stroke-linecap="round"/>
  <line x1="116" y1="96"  x2="128" y2="108" stroke="white" stroke-width="3"   stroke-linecap="round"/>
  <line x1="128" y1="56"  x2="116" y2="68"  stroke="white" stroke-width="3"   stroke-linecap="round"/>
  <line x1="84"  y1="96"  x2="72"  y2="108" stroke="white" stroke-width="3"   stroke-linecap="round"/>
  <!-- AILINK text -->
  <text x="100" y="158" font-family="Manrope, system-ui, sans-serif" font-size="26" font-weight="800"
        fill="url(#textgrad)" text-anchor="middle" letter-spacing="-0.5">AILINK</text>
  <!-- Tagline -->
  <text x="100" y="174" font-family="system-ui, sans-serif" font-size="8.5" font-weight="600"
        fill="#31F2C3" text-anchor="middle" letter-spacing="2.5" opacity="0.7">INTELLIGENCE CONNECTED</text>
</svg>
