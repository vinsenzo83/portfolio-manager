<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="navbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D8FF"/>
      <stop offset="100%" style="stop-color:#A86BFF"/>
    </linearGradient>
  </defs>
  <!-- Gradient rounded square background (exact navbar style) -->
  <rect width="64" height="64" fill="url(#navbg)" rx="14"/>
  <!-- "D" letter center — Poppins-style bold, dark fill -->
  <text x="32" y="44" font-family="Poppins, system-ui, sans-serif" font-size="32"
        font-weight="900" fill="#080C14" text-anchor="middle">D</text>
</svg>
