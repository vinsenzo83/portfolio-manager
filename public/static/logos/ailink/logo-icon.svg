<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="navbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#003BFF"/>
      <stop offset="100%" style="stop-color:#31F2C3"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background: gradient rounded square -->
  <rect width="64" height="64" fill="url(#navbg)" rx="14"/>
  <!-- Node icon: center circle + 8 lines (exact navbar SVG scaled from 20→64) -->
  <!-- scale factor: 64/20 = 3.2, center shift: 32 - 10*3.2 = 0, so multiply coords by 3.2 -->
  <!-- center dot -->
  <circle cx="32" cy="32" r="6" fill="white" filter="url(#glow)"/>
  <!-- 4 main lines (N/S/E/W) -->
  <line x1="32" y1="3.2"  x2="32" y2="22.4" stroke="white" stroke-width="3"   stroke-linecap="round"/>
  <line x1="32" y1="41.6" x2="32" y2="60.8" stroke="white" stroke-width="3"   stroke-linecap="round"/>
  <line x1="3.2"  y1="32" x2="22.4" y2="32" stroke="white" stroke-width="3"   stroke-linecap="round"/>
  <line x1="41.6" y1="32" x2="60.8" y2="32" stroke="white" stroke-width="3"   stroke-linecap="round"/>
  <!-- 4 diagonal lines (NW/NE/SW/SE) -->
  <line x1="10.24" y1="10.24" x2="23.04" y2="23.04" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="40.96" y1="40.96" x2="53.76" y2="53.76" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="53.76" y1="10.24" x2="40.96" y2="23.04" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="23.04" y1="40.96" x2="10.24" y2="53.76" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
</svg>
