<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 80" width="380" height="80">
  <defs>
    <linearGradient id="navbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#003BFF"/>
      <stop offset="100%" style="stop-color:#31F2C3"/>
    </linearGradient>
    <linearGradient id="textgrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#003BFF"/>
      <stop offset="100%" style="stop-color:#31F2C3"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Dark background -->
  <rect width="380" height="80" fill="#080d1a" rx="14"/>
  <!-- Icon: gradient square 46x46 at (17, 17) -->
  <rect x="17" y="17" width="46" height="46" fill="url(#navbg)" rx="10"/>
  <!-- Node icon (center=40, 40; scale=2.3) -->
  <circle cx="40" cy="40" r="5" fill="white" filter="url(#glow)"/>
  <!-- N/S/E/W -->
  <line x1="40" y1="20"  x2="40" y2="32"  stroke="white" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="40" y1="48"  x2="40" y2="60"  stroke="white" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="20" y1="40"  x2="32" y2="40"  stroke="white" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="48" y1="40"  x2="60" y2="40"  stroke="white" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Diagonals -->
  <line x1="24"  y1="24"  x2="33"  y2="33"  stroke="white" stroke-width="2"   stroke-linecap="round"/>
  <line x1="47"  y1="47"  x2="56"  y2="56"  stroke="white" stroke-width="2"   stroke-linecap="round"/>
  <line x1="56"  y1="24"  x2="47"  y2="33"  stroke="white" stroke-width="2"   stroke-linecap="round"/>
  <line x1="33"  y1="47"  x2="24"  y2="56"  stroke="white" stroke-width="2"   stroke-linecap="round"/>
  <!-- AILINK text -->
  <text x="82" y="47" font-family="Manrope, system-ui, sans-serif" font-size="30" font-weight="800"
        fill="url(#textgrad)" letter-spacing="-0.5">AILINK</text>
  <!-- Tagline -->
  <text x="82" y="62" font-family="system-ui, sans-serif" font-size="9" font-weight="600"
        fill="#31F2C3" letter-spacing="2" opacity="0.65">INTELLIGENCE CONNECTED</text>
</svg>
