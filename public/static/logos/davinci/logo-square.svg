<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080C14"/>
      <stop offset="100%" style="stop-color:#0c0820"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D8FF"/>
      <stop offset="100%" style="stop-color:#A86BFF"/>
    </linearGradient>
    <filter id="f1" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="200" height="200" fill="url(#bg)" rx="16"/>
  <rect width="200" height="200" fill="none" stroke="#00D8FF" stroke-width="1.5" stroke-opacity="0.2" rx="16"/>
  <!-- Corner marks -->
  <path d="M16 8 L8 8 L8 16" fill="none" stroke="#00D8FF" stroke-width="1.5" opacity="0.4"/>
  <path d="M184 8 L192 8 L192 16" fill="none" stroke="#A86BFF" stroke-width="1.5" opacity="0.4"/>
  <path d="M16 192 L8 192 L8 184" fill="none" stroke="#A86BFF" stroke-width="1.5" opacity="0.4"/>
  <path d="M184 192 L192 192 L192 184" fill="none" stroke="#00D8FF" stroke-width="1.5" opacity="0.4"/>
  <!-- D icon - artistic palette circle -->
  <circle cx="100" cy="95" r="32" fill="none" stroke="url(#glow)" stroke-width="2" opacity="0.2"/>
  <circle cx="100" cy="95" r="22" fill="none" stroke="url(#glow)" stroke-width="1.5" opacity="0.4"/>
  <!-- Brush stroke arc -->
  <path d="M78 85 Q100 65 122 85 Q130 95 122 110 Q100 130 78 110 Q70 95 78 85Z" fill="none" stroke="url(#glow)" stroke-width="2" opacity="0.5"/>
  <!-- D letter -->
  <text x="100" y="102" font-family="'Poppins','Arial',sans-serif" font-size="28" font-weight="900" fill="url(#glow)" text-anchor="middle" filter="url(#f1)">D</text>
  <!-- Art dots -->
  <circle cx="76" cy="82" r="3" fill="#00D8FF" opacity="0.7" filter="url(#f1)"/>
  <circle cx="124" cy="82" r="3" fill="#A86BFF" opacity="0.7" filter="url(#f1)"/>
  <circle cx="100" cy="130" r="3" fill="#00D8FF" opacity="0.5" filter="url(#f1)"/>
  <!-- Text -->
  <text x="100" y="160" font-family="'Poppins','Arial',sans-serif" font-size="13" font-weight="900" fill="url(#glow)" text-anchor="middle" letter-spacing="1" filter="url(#f1)">DaVinci</text>
  <text x="100" y="174" font-family="'Courier New',monospace" font-size="8" fill="#00D8FF" text-anchor="middle" letter-spacing="5" opacity="0.6">AI</text>
</svg>
