<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080f1a"/>
      <stop offset="100%" style="stop-color:#0a1520"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#31F2C3"/>
      <stop offset="100%" style="stop-color:#00e5b3"/>
    </linearGradient>
    <filter id="f1" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="200" height="200" fill="url(#bg)" rx="16"/>
  <rect width="200" height="200" fill="none" stroke="#31F2C3" stroke-width="1.5" stroke-opacity="0.25" rx="16"/>
  <!-- Corner marks -->
  <path d="M16 8 L8 8 L8 16" fill="none" stroke="#31F2C3" stroke-width="1.5" opacity="0.5"/>
  <path d="M184 8 L192 8 L192 16" fill="none" stroke="#31F2C3" stroke-width="1.5" opacity="0.5"/>
  <path d="M16 192 L8 192 L8 184" fill="none" stroke="#31F2C3" stroke-width="1.5" opacity="0.5"/>
  <path d="M184 192 L192 192 L192 184" fill="none" stroke="#31F2C3" stroke-width="1.5" opacity="0.5"/>
  <!-- Chain links icon -->
  <circle cx="83" cy="100" r="22" fill="none" stroke="#31F2C3" stroke-width="2.5" opacity="0.15"/>
  <circle cx="83" cy="100" r="14" fill="none" stroke="#31F2C3" stroke-width="2" opacity="0.4"/>
  <circle cx="117" cy="100" r="22" fill="none" stroke="#31F2C3" stroke-width="2.5" opacity="0.15"/>
  <circle cx="117" cy="100" r="14" fill="none" stroke="#31F2C3" stroke-width="2" opacity="0.4"/>
  <!-- Center connector -->
  <rect x="90" y="94" width="20" height="12" rx="6" fill="#31F2C3" opacity="0.12"/>
  <rect x="90" y="94" width="20" height="12" rx="6" fill="none" stroke="#31F2C3" stroke-width="1.5" opacity="0.7"/>
  <!-- AI text center -->
  <text x="100" y="105" font-family="'Courier New',monospace" font-size="11" font-weight="900" fill="url(#glow)" text-anchor="middle" filter="url(#f1)">AI</text>
  <!-- Pulse dots -->
  <circle cx="83" cy="100" r="3" fill="#31F2C3" opacity="0.9" filter="url(#f1)"/>
  <circle cx="117" cy="100" r="3" fill="#31F2C3" opacity="0.9" filter="url(#f1)"/>
  <!-- Text -->
  <text x="100" y="160" font-family="'Courier New',monospace" font-size="15" font-weight="900" fill="url(#glow)" text-anchor="middle" letter-spacing="4" filter="url(#f1)">AILINK</text>
  <text x="100" y="174" font-family="'Courier New',monospace" font-size="7" fill="#31F2C3" text-anchor="middle" letter-spacing="4" opacity="0.6">INTELLIGENCE CONNECTED</text>
</svg>
